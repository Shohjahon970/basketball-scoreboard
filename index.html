<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <div class="score-display">
                    <h1 id="home-score">0</h1>
                </div>
                <button  onclick="increment_home_score_1()">+1</button>
                <button  onclick="increment_home_score_2()">+2</button>
                <button  onclick="increment_home_score_3()">+3</button>
            </div>
            <div>
                <h3>AWAY</h3>
                <div class="score-display">
                    <h1 id="guest-score">0</h1>
                </div>
                <button  onclick="increment_guest_score_1()">+1</button>
                <button  onclick="increment_guest_score_2()">+2</button>
                <button  onclick="increment_guest_score_3()">+3</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
